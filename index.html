<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harriet and Tobys Wedding Games</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <h1>Harriet and Toby's Wedding Games</h1>
  
  <div class="game-title connections">🔗 Connections</div>
  <div class="game-title strands">🧵 Strands</div>
  <div class="game-title wordle">🟩 Wordle</div>
  
  <div id="menu">
    <p>Choose a game:</p>
    <button class="game-button connections" onclick="startGame('connections')">🔗 Connections</button>
    <button class="game-button strands" onclick="startGame('strands')">🧵 Strands</button>
    <button class="game-button wordle" onclick="startGame('wordle')">🟩 Wordle</button>
  </div>

  <div id="gameContainer">
    <button id="backButton" onclick="goBackToMenu()">← Back to Menu</button>
    
    <div id="connectionsGame" style="display: none;">
      <div id="instructions">Select 4 related words</div>
      <div id="feedback"></div>
      <div id="found"></div>
      <div id="grid"></div>
    </div>

    <div id="strandsGame" style="display: none;">
      <div id="instructions">Find all theme words. Click and drag to select letters, release to submit.</div>
      <div id="strandsCurrentWord"></div>
      <div id="strandsFeedback"></div>
      <div id="strandsFound"></div>
      <div id="strandsGrid"></div>
    </div>

    <div id="wordleGame" style="display: none;">
      <div id="instructions">Guess the 5-letter wedding word. You have 6 attempts.</div>
      <div class="wordle-controls">
        <input id="wordleInput" type="text" maxlength="5" placeholder="Enter guess" autocomplete="off">
        <button id="wordleSubmit" onclick="submitWordleGuess()">Submit</button>
      </div>
      <div id="wordleFeedback"></div>
      <div id="wordleGrid"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
